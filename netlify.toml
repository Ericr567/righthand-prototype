[build]
  command = "npm run validate:env && npm run build:web"
  publish = "web-build"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[context.deploy-preview.environment]
  APP_ENV = "staging"

[context.production.environment]
  APP_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
